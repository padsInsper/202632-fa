format:
  html:
    theme:
      light: [flatly, assets/insper-theme.scss]
    css: assets/insper-custom.css
    toc: true
    toc-depth: 3
    code-fold: show
    code-tools: true
    code-copy: true
    code-overflow: wrap
    highlight-style: monokai
    fig-align: center
    fig-responsive: true
    embed-resources: false
    smooth-scroll: true
    link-external-newwindow: true
    lang: pt

execute:
  freeze: auto
  warning: false
  message: false

knitr:
  opts_chunk:
    fig.width: 10
    fig.height: 6
