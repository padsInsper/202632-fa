          - text: "Trabalho Intermediário"
            href: trabalhos/intermediario.qmd
      - text: "Parte 2: Financial Analytics"
        menu:
          - text: "Aula 4: Volatilidade e GARCH"
            href: aulas/aula04-volatilidade.qmd
          - text: "Aula 5: VaR e Risco"
            href: aulas/aula05-var.qmd
          - text: "Aula 6: CAPM e Portfólios"
            href: aulas/aula06-portfolios.qmd
