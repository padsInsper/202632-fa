            href: aulas/aula07-avancados.qmd
          - text: "---"
          - text: "Lab 3: Séries Financeiras"
            href: labs/lab03-financeiras.qmd
          - text: "Lab 4: Otimização de Portfólios"
            href: labs/lab04-portfolios.qmd
          - text: "Lab 5: Projeto Final"
            href: labs/lab05-projeto.qmd
          - text: "---"
          - text: "Trabalho Final"
            href: trabalhos/final.qmd
      - text: "Slides"
        menu:
          - text: "Aula 1: Fundamentos"
            href: slides/aula01-slides.qmd
          - text: "Aula 2: ARIMA"
            href: slides/aula02-slides.qmd
          - text: "Aula 3: Previsão"
